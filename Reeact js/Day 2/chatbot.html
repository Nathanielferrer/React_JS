<!DOCTYPE html>
<html>
<head>
  <title>Chatbot</title>
  <style>
  .container {
    display: flex;
    justify-content: center;
  }
  
  .main-container {
    max-width: 600px;
    width: 100%;
    margin: 0 auto;
  }

  .input-text {
    padding: 10px 15px;
    border-radius: 10px;
    flex: 1;
    box-sizing: border-box;
  }

  .style-button {
    background-color: green;
    color: white;
    padding: 7px;
    border: none;
    margin-left: 10px;
    border-radius: 5px;
    cursor: pointer;
  }

  .chat-message {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 10px 0;
  }

  /* Add these new styles to position messages correctly */
  .chat-message.chatbot {
    justify-content: flex-start;
  }

  .chat-message.user {
    justify-content: flex-end;
  }

  .message-text {
    padding: 10px 15px;
    border-radius: 15px;
    max-width: 70%;
    word-wrap: break-word;
  }

  .chat-message.chatbot .message-text {
    background-color: #f0f0f0;
  }

  .chat-message.user .message-text {
    background-color: #007bff;
    color: white;
  }
</style>
</head>
<body>
    
  <div class="container"></div>
  
  
  <script src="https://unpkg.com/supersimpledev/react.js"></script>
  <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
  <script src="https://unpkg.com/supersimpledev/babel.js"></script>
  <script src="https://unpkg.com/supersimpledev/chatbot.js" ></script>
  <script type="text/babel"> 
  
    function ChatbotInput({chatMessages, setChatMessages}) {
      const [inputText, setInputText] = React.useState('');

      function saveInputText(event) {
        setInputText(event.target.value); //gives the elements that i am typing in
      }

      function sendMessage() {
        const newChatMessages = [
          ...chatMessages,
          {
            message: inputText,
            sender: "user",
            id: crypto.randomUUID()
          }      
        ]

        setChatMessages(newChatMessages);

        const response = Chatbot.getResponse(inputText);
        setChatMessages([
          ...newChatMessages,
          {
            message: response,
            sender: "chatbot",
            id: crypto.randomUUID()
          }
        ]);

        setInputText(''); //This is to update the text into empty string so after we send our message the message in the text box will be removed
      }

      return (
        <div className="container">  {/*This is called Fragments. A group elements together without using another div to be nested*/}
          <input 
            placeholder="Send a message to chatbot" 
            size="30"
            onChange = {saveInputText} //Runs a function when we change the text inside an input elements
            value = {inputText} //Add a props value to update it to html
            className="input-text"
          />
          <button
            onClick = {sendMessage}
            className="style-button"
          >Send</button>
        </div>
      );
    }


    function ChatMessage({message, sender}) { {/*Reusable components*/}
      return (
        <div className={`chat-message ${sender}` }>
          {sender === 'chatbot' && <img src="chatbot.png" width="50"/> } {/*The shortcut for If-Statement that if the condition in left is true then the result is the value on the right*/}
          <span className="message-text">{message}</span>
          {sender === 'user' && <img src="profile.jpg" width="50"/>}
        </div>
      );
    }


    function ChatMessages({chatMessages}) { {/*Object {} = group of related values together*/}
      return (
        <>
          {chatMessages.map((chatMessage) => {  {/*Map - Converting value into a new value */}
            return (
              <ChatMessage
                message = {chatMessage.message}
                sender = {chatMessage.sender }
                key = {chatMessage.id}
              />
            );
          })}
        </>
      );    
    }

    function App() {
      const [chatMessages, setChatMessages] = React.useState([{ 
        //Inside the array chatMeesages, setChatMessages is array Destructuring
        message: "Hello Chatbot", 
        sender: "user",
        id: "id1" //Each components will have key to track changes
      }, {
        message: "Hello! How can i help you?", 
        sender: "chatbot",
        id: "id2"
      }, {
        message: "What is the Date today?",
        sender: "user", 
        id: "id3"
      }, {
        message: "The Date today is March 13",
        sender: "chatbot", 
        id: "id4"
      }]);
      return (
        <div className="main-container">
          <ChatbotInput
            chatMessages = {chatMessages}
            setChatMessages = {setChatMessages}  
          /> {/*Same thing as ChatbotInput() but it look like we are creating our own html elements*/}
          <ChatMessages
            chatMessages = {chatMessages}
          />
        </div>
      );
    } 
 

    //React = we should not modify the data directly, always create a copy to modify the date
    //State = Data that is connected to the HTML, if i update the date it will update the HTML
    //State = save data that changes over time 
    //Event Handlers = Run a function when we interact with the website
    // Key = helps react track changes in the array 
    // React code goes here 
    // The querySelector is used to select the html element from page and pass it inside the js-contanainer and let js modify the html elements.
    const container = document.querySelector('.container');//Inside the  queryseletor we can use specific class. Use (.) before the class to select the class. If we want to select the id we can use (#) before the id name.
    ReactDOM.createRoot(container).render(<App/>);
    //ReactDOM.createRoot is used to setup the react.
    //Then call the container variable to get the html elements on it
    //Everything we create in the react container will be displayed in the html page
    //Before that we call render to display something like inside the parentheses
    </script>
</body>
</html>
