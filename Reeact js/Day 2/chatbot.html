<!DOCTYPE html>
<html>
<head>
  <title>Chatbot</title>
</head>
<body>
    
  <div class="container"></div>
  
  
  <script src="https://unpkg.com/supersimpledev/react.js"></script>
  <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
  <script src="https://unpkg.com/supersimpledev/babel.js"></script>
  <script type="text/babel"> 
  
    function ChatbotInput() {
      
      function saveInputText(event) {
        console.log(event.target.value); //gives the elements that i am typing in
      }

      return (
        <>  {/*This is called Fragments. A group elements together without using another div to be nested*/}
          <input 
            placeholder="Send a message to chatbot" 
            size="30"
            onChange = {saveInputText} //Runs a function when we change the text inside an input elements
          />
          <button>Send</button>
        </>
      );
    }

    function ChatMessage({message, sender}) { {/*Reusable components*/}
      return (
        <div>
          {sender === 'chatbot' && <img src="chatbot.png" width="50"/> } {/*The shortcut for If-Statement that if the condition in left is true then the result is the value on the right*/}
          {message}
          {sender === 'user' && <img src="profile.jpg" width="50"/>}
        </div>
      );
    }

    function ChatMessages() { {/*Object {} = group of related values together*/}
      const [chatMessages, setChatMessages] = React.useState([{ 
        //Inside the array chatMeesages, setChatMessages is array Destructuring
        message: "Hello Chatbot", 
        sender: "user",
        id: "id1" //Each components will have key to track changes
      }, {
        message: "Hello! How can i help you?", 
        sender: "chatbot",
        id: "id2"
      }, {
        message: "What is the Date today?",
        sender: "user", 
        id: "id3"
      }, {
        message: "The Date today is March 13",
        sender: "chatbot", 
        id: "id4"
      }]);



      function sendMessage() { {/*Push add a value in an array*/}
        setChatMessages([
          ...chatMessages,
          {
            message: "test",
            sender: "user",
            id: crypto.randomUUID()
          }
        ]);
      } 

      return (
        <>
          <button onClick={sendMessage}>Send a Message</button> {/*Onclick = Event | sendMessage = EventHandler*/}
          
          {chatMessages.map((chatMessage) => {  {/*Map - Converting value into a new value */}
            return (
              <ChatMessage
                message = {chatMessage.message}
                sender = {chatMessage.sender }
                key = {chatMessage.id}
              />
            );
          })}
        </>
      );    
    }

    function App() {
      return (
        <>
          <ChatbotInput /> {/*Same thing as ChatbotInput() but it look like we are creating our own html elements*/}
          <ChatMessages />
        </>
      );
    } 
 

    //React = we should not odify the data directly, always create a copy to modify the date
    //State = Data that is connected to the HTML, if i update the date it will update the HTML
    //Event Handlers = Run a function when we interact with the website
    // Key = helps react track changes in the array 
    // React code goes here 
    // The querySelector is used to select the html element from page and pass it inside the js-contanainer and let js modify the html elements.
    const container = document.querySelector('.container');//Inside the  queryseletor we can use specific class. Use (.) before the class to select the class. If we want to select the id we can use (#) before the id name.
    ReactDOM.createRoot(container).render(<App/>);
    //ReactDOM.createRoot is used to setup the react.
    //Then call the container variable to get the html elements on it
    //Everything we create in the react container will be displayed in the html page
    //Before that we call render to display something like inside the parentheses
    </script>
</body>
</html>
