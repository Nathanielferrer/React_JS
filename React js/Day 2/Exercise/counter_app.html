<!DOCTYPE html>
<html>
<head>
  <title>Chatbot</title>
</head>
<body>
    
  <div class="container"></div>
  
  
  <script src="https://unpkg.com/supersimpledev/react.js"></script>
  <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
  <script src="https://unpkg.com/supersimpledev/babel.js"></script>
  <script type="text/babel"> 
    


    function CounterApp({count, setCount}) {
        
        function displayText() {
            setCount(count + 1);

        }
        const modify = count === 0 ? "time" : "times";

        return (
            <>
                <button onClick = {displayText}>
                    Clicked {count} {modify}
                </button>

            </>
        );
        

    }


    function App() {
        const [count, setCount] = React.useState(0);

        function resetButton() {
            setCount(0)
        }
        return (
            <>
                <CounterApp count = {count} setCount = {setCount}/>
                <CounterApp count = {count} setCount = {setCount}/>
                <button onClick = {resetButton}>Reset</button>
            </>
        );
    }


    const container = document.querySelector('.container');//Inside the  queryseletor we can use specific class. Use (.) before the class to select the class. If we want to select the id we can use (#) before the id name.
    ReactDOM.createRoot(container).render(<App/>);
    </script>
</body>
</html>
